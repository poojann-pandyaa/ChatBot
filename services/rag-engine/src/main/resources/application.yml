server:
  port: 8000

spring:
  application:
    name: rag-engine
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:SuperSecureRedisPassword123}

# ── gRPC server port ──────────────────────────────────────────────────────────
grpc:
  server:
    port: ${GRPC_SERVER_PORT:9091}

# ── gRPC client config for ml-service ────────────────────────────────────────
ml-service:
  grpc:
    host: ${ML_SERVICE_GRPC_HOST:ml-service}
    port: ${ML_SERVICE_GRPC_PORT:50051}

services:
  qdrant:
    url: ${QDRANT_URL:http://localhost:6333}
    collection: stackexchange_chunks
  elasticsearch:
    url: ${ELASTICSEARCH_URL:http://localhost:9200}
    index: stackexchange_chunks
  # Legacy REST url kept for fallback health checks only
  ml-service:
    url: ${ML_SERVICE_URL:http://localhost:8001}
  ollama:
    url: ${OLLAMA_URL:http://localhost:11434}
    model: ${OLLAMA_MODEL:gemma2:2b}

management:
  endpoints:
    web:
      exposure:
        include: health, info, prometheus
  endpoint:
    health:
      show-details: always

resilience4j:
  circuitbreaker:
    instances:
      qdrantClient:
        registerHealthIndicator: true
        slidingWindowSize: 5
        failureRateThreshold: 50
      elasticsearchClient:
        registerHealthIndicator: true
        slidingWindowSize: 5
        failureRateThreshold: 50
      mlServiceClient:
        registerHealthIndicator: true
        slidingWindowSize: 5
        failureRateThreshold: 50
        waitDurationInOpenState: 10s
        automaticTransitionFromOpenToHalfOpenEnabled: true
      ollamaClient:
        registerHealthIndicator: true
        slidingWindowSize: 5
        failureRateThreshold: 50
  retry:
    instances:
      qdrantClient:
        maxAttempts: 3
        waitDuration: 1s
      elasticsearchClient:
        maxAttempts: 3
        waitDuration: 1s
      mlServiceClient:
        maxAttempts: 3
        waitDuration: 2s
        exponentialBackoff:
          enabled: true
          multiplier: 2
      ollamaClient:
        maxAttempts: 3
        waitDuration: 1s
