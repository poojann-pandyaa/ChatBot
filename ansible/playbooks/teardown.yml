---
- name: Teardown Enterprise LLMOps Platform from Minikube
  hosts: localhost
  connection: local
  gather_facts: false

  vars:
    k8s_namespace: "llmops-platform"
    build_dir: "{{ playbook_dir }}/build"

  tasks:
    - name: Delete namespace (deletes all associated pods/services/secrets)
      shell: "kubectl delete namespace {{ k8s_namespace }} --ignore-not-found=true"
      register: delete_out
      changed_when: "'deleted' in delete_out.stdout"

    - name: Remove local build directory
      file:
        path: "{{ build_dir }}"
        state: absent
      changed_when: true

    - name: Display completion status
      debug:
        msg: "LLMOps Platform successfully torn down from Kubernetes."
