version: '3.8'

services:
  vault:
    image: hashicorp/vault:1.15.2
    container_name: vault-dev
    ports:
      - "8200:8200"
    environment:
      VAULT_DEV_ROOT_TOKEN_ID: "root-token"
      VAULT_DEV_LISTEN_ADDRESS: "0.0.0.0:8200"
      VAULT_ADDR: "http://127.0.0.1:8200"
    cap_add:
      - IPC_LOCK
    healthcheck:
      test: ["CMD", "vault", "status", "-format=json"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis/redis-stack-server:latest
    container_name: redis-dev
    command: redis-server /etc/redis-stack.conf --requirepass SuperSecureRedisPassword123
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "SuperSecureRedisPassword123", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  postgres:
    image: postgres:15-alpine
    container_name: postgres-dev
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: SuperSecurePostgresPassword123
      POSTGRES_DB: chatbot_db
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  qdrant:
    image: qdrant/qdrant:v1.8.0
    container_name: qdrant-dev
    ports:
      - "6333:6333"
      - "6334:6334"

  elasticsearch:
    image: elasticsearch:8.12.1
    container_name: elasticsearch-dev
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    ports:
      - "9200:9200"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9200/"]
      interval: 10s
      timeout: 10s
      retries: 5

  ml-service:
    build:
      context: ./services/ml-service
      dockerfile: Dockerfile
    container_name: ml-service-dev
    ports:
      - "8001:8000"
    environment:
      - HF_HUB_OFFLINE=0
      - HF_DATASETS_OFFLINE=0
      - TRANSFORMERS_OFFLINE=0

  rag-engine:
    build:
      context: ./services/rag-engine
      dockerfile: Dockerfile
    container_name: rag-engine-dev
    ports:
      - "8000:8000"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - QDRANT_URL=http://qdrant:6333
      - ELASTICSEARCH_URL=http://elasticsearch:9200
      - OLLAMA_URL=http://host.docker.internal:11434
      - OLLAMA_MODEL=gemma2:2b
      - OLLAMA_NUM_PARALLEL=4
      - VAULT_ENABLED=true
      - VAULT_ADDR=http://vault:8200
      - VAULT_TOKEN=root-token
      - VAULT_SECRET_PATH=llmops-platform
      - ML_SERVICE_URL=http://ml-service:8000
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=SuperSecureRedisPassword123
    depends_on:
      vault:
        condition: service_healthy
      qdrant:
        condition: service_started
      elasticsearch:
        condition: service_healthy
      ml-service:
        condition: service_started

  app-gateway:
    build:
      context: ./services/app-gateway
      dockerfile: Dockerfile
    container_name: app-gateway-dev
    ports:
      - "8080:8080"
    environment:
      - RAG_ENGINE_URL=http://rag-engine:8000
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=SuperSecureRedisPassword123
      - VAULT_ENABLED=true
      - VAULT_ADDR=http://vault:8200
      - VAULT_TOKEN=root-token
      - VAULT_SECRET_PATH=llmops-platform
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/chatbot_db
      - SPRING_DATASOURCE_USERNAME=postgres
      - SPRING_DATASOURCE_PASSWORD=SuperSecurePostgresPassword123
    depends_on:
      vault:
        condition: service_healthy
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
      rag-engine:
        condition: service_started

  frontend:
    build:
      context: ./services/frontend
      dockerfile: Dockerfile
    container_name: frontend-dev
    ports:
      - "3000:3000"
    environment:
      - APP_GATEWAY_URL=http://app-gateway:8080
    depends_on:
      - app-gateway
